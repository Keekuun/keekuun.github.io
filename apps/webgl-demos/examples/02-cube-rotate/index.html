<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>02 Cube Rotate</title>
  <link rel="stylesheet" href="/shared/demo.css" />
</head>
<body>
  <header class="bar"><a href="/">← Demos</a><span>02 · 旋转立方体（36 顶点）</span></header>
  <canvas id="canvas"></canvas>
  <div class="panel">
    <strong>着色模式</strong>
    <label><input type="radio" name="mode" value="face" checked /> 按面（6 色 · 6 个面）</label>
    <label><input type="radio" name="mode" value="vertex" /> 按顶点序号（36 色 · 看重复）</label>
    <label><input type="radio" name="mode" value="corner" /> 按角点（8 色 · 真实拐角）</label>
    <p class="status" id="hint">按 C 快捷键切换 · 棱边「色差」= 同一坐标写了多条顶点</p>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
