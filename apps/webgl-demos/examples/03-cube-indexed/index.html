<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>03 Indexed Cube</title>
  <link rel="stylesheet" href="/shared/demo.css" />
</head>
<body>
  <header class="bar"><a href="/">← Demos</a><span>03 · 索引立方体（8 顶点 + 36 索引）</span></header>
  <canvas id="canvas"></canvas>
  <div class="panel">
    <strong>着色模式</strong>
    <label><input type="radio" name="mode" value="face" checked /> 按面（6 色 · 6 次 draw）</label>
    <label><input type="radio" name="mode" value="corner" /> 按角点（8 色 · 顶点 attribute）</label>
    <label><input type="radio" name="mode" value="triangle" /> 按三角（12 色 · 索引粒度）</label>
    <p class="status" id="hint">对比 Demo 02：索引复用 8 点，按面需多次 draw</p>
    <p class="status" style="font-size:12px;color:#8b949e;margin-top:4px;">按 C 切换</p>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
