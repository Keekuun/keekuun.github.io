<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGL Demos</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #8b949e; margin-bottom: 1.5rem; line-height: 1.6; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      max-width: 960px;
    }
    a.card {
      display: block;
      padding: 1rem 1.25rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      transition: border-color 0.15s;
    }
    a.card:hover { border-color: #58a6ff; }
    .card h2 { font-size: 1rem; margin-bottom: 0.35rem; color: #58a6ff; }
    .card span { font-size: 0.85rem; color: #8b949e; }
    code { background: #21262d; padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.85em; }
  </style>
</head>
<body>
  <h1>WebGL 实践 Demo</h1>
  <p>
    配合博客 <code>docs/3d/webgl</code> 系列。本地运行：
    <code>pnpm --dir apps/webgl-demos dev</code>
    · <a href="http://localhost:5174/" style="color:#58a6ff">Three.js Demos</a>
    · 交叉对照见 <code>docs/3d/webgl/practices/03-webgl-threejs-crosswalk.md</code>
  </p>
  <div class="grid" id="list"></div>
  <script type="module">
    const demos = [
      { id: '01-triangle', title: '01 · 彩色三角形', doc: '01 基础概念' },
      { id: '02-cube-rotate', title: '02 · 旋转立方体', doc: '09 矩阵与 3D' },
      { id: '03-cube-indexed', title: '03 · 索引立方体', doc: '10 索引缓冲' },
      { id: '04-depth-cubes', title: '04 · 深度遮挡', doc: '11 深度与剔除' },
      { id: '05-textured-cube', title: '05 · 贴图立方体', doc: '12 纹理' },
      { id: '06-lit-cube', title: '06 · 光照立方体', doc: '13 光照' },
      { id: '07-orbit-camera', title: '07 · 轨道相机', doc: '实践：交互' },
      { id: '08-fbo-grayscale', title: '08 · FBO 灰度后处理', doc: '15 FBO' },
      { id: '09-instancing', title: '09 · 实例化网格', doc: 'WebGL2 03' },
      { id: '10-picking', title: '10 · 点击拾取', doc: '进阶：拾取' },
      { id: '11-particles', title: '11 · 粒子点云', doc: '进阶：粒子' },
      { id: '12-shader-gradient', title: '12 · Shader 热力渐变', doc: '进阶：可视化' },
      { id: '13-shadow-mapping', title: '13 · 阴影贴图', doc: '进阶：Shadow Map' },
      { id: '14-skybox', title: '14 · Cubemap 天空盒', doc: '进阶：环境贴图' },
      { id: '15-blur-post', title: '15 · 分离式模糊', doc: '进阶：后处理' },
      { id: '16-normal-map', title: '16 · 法线贴图砖墙', doc: '进阶：TBN' },
      { id: '17-bloom-post', title: '17 · Bloom 辉光', doc: '进阶：Bloom' },
      { id: '18-webgl2-vao', title: '18 · WebGL2 VAO', doc: 'WebGL2 02' },
      { id: '19-webgpu-triangle', title: '19 · WebGPU 三角形', doc: 'WebGPU 01' },
      { id: '20-webgl2-ubo', title: '20 · WebGL2 UBO', doc: 'WebGL2 02 UBO' },
      { id: '21-webgpu-compute', title: '21 · WebGPU Compute 粒子', doc: 'WebGPU 02' },
      { id: '22-webgl2-mrt', title: '22 · WebGL2 MRT G-Buffer', doc: 'WebGL2 04' },
    ];
    const list = document.getElementById('list');
    list.innerHTML = demos.map((d) => `
      <a class="card" href="/examples/${d.id}/index.html">
        <h2>${d.title}</h2>
        <span>对应文档：${d.doc}</span>
      </a>
    `).join('');
  </script>
</body>
</html>
