<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adv 11 HDRI</title>
  <link rel="stylesheet" href="/shared/demo.css" />
</head>
<body class="layout-full">
  <header class="bar"><a href="/">← Demos</a><span>进阶 11 · HDRI 与环境光照</span></header>
  <div id="root" style="width:100%;height:calc(100% - 40px);"></div>
  <div class="panel">
    <strong>环境模式</strong>
    <button id="modeLights">三点光（无 HDRI）</button>
    <button id="modeEnv">仅 environment</button>
    <button id="modeBg">environment + 背景</button>
    <label>曝光 exposure: <span id="expVal">1.0</span>
      <input type="range" id="exposure" min="0.2" max="2.5" step="0.1" value="1" />
    </label>
    <p class="status" id="status">加载模型中…</p>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
