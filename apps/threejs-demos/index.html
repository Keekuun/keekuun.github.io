<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Demos</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    h2 { font-size: 1rem; color: #8b949e; margin: 2rem 0 0.75rem; font-weight: 600; }
    p { color: #8b949e; margin-bottom: 1.5rem; line-height: 1.6; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      max-width: 1100px;
    }
    a.card {
      display: block;
      padding: 1rem 1.25rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      transition: border-color 0.15s;
    }
    a.card:hover { border-color: #58a6ff; }
    a.card h3 { font-size: 1rem; margin-bottom: 0.35rem; color: #58a6ff; }
    a.card span { font-size: 0.85rem; color: #8b949e; }
    code { background: #21262d; padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.85em; }
  </style>
</head>
<body>
  <h1>Three.js 实践 Demo</h1>
  <p>
    配合博客 <code>docs/3d/threejs</code>。本地运行：
    <code>pnpm --dir apps/threejs-demos dev</code>
    · <a href="http://localhost:5173/" style="color:#58a6ff">WebGL Demos</a>
  </p>

  <h2>微实验 · Labs</h2>
  <div class="grid" id="labs"></div>

  <h2>进阶 · Advanced</h2>
  <div class="grid" id="advanced"></div>

  <h2>作品集 · Portfolio</h2>
  <div class="grid" id="portfolio"></div>

  <script type="module">
    const labs = [
      { id: '01-echarts-vs-three', title: '01 · ECharts vs Three', doc: '从大屏到 3D' },
      { id: '02-first-scene', title: '02 · 第一个场景', doc: '旋转立方体 / DPR / 按需渲染' },
      { id: '03-solar-system', title: '03 · 场景图', doc: '父子节点公转自转' },
      { id: '04-camera-fov', title: '04 · 相机', doc: 'FOV / fitCamera' },
      { id: '05-materials', title: '05 · 材质画廊', doc: 'Basic / Lambert / Standard' },
      { id: '06-lights-shadows', title: '06 · 光与阴影', doc: '三点光 / 阴影 / 孪生光' },
      { id: '07-gltf-loader', title: '07 · glTF 加载', doc: '进度条 / 归一化' },
      { id: '08-interaction', title: '08 · 交互', doc: 'Orbit 预设 / 拾取 / 面板' },
      { id: '09-dispose-stats', title: '09 · 性能', doc: 'dispose / Stats / Instancing' },
      { id: '10-scene-module', title: '10 · 工程模块', doc: 'createScene 封装' },
      { id: '11-webgpu-renderer', title: '11 · WebGPURenderer', doc: 'WebGPU 回退 / 对照 Lab 02' },
      { id: '12-webgl-vs-webgpu', title: '12 · WebGL vs WebGPU', doc: '进阶 19 · 双渲染器 FPS' },
    ];
    const advanced = [
      { id: '11-hdri', title: '进阶 11 · HDRI', doc: 'environment / PMREM / DamagedHelmet' },
      { id: '12-outline', title: '进阶 12 · OutlinePass', doc: 'EffectComposer 选中描边' },
      { id: '12-bloom', title: '进阶 12 · Bloom', doc: 'UnrealBloomPass 告警辉光' },
      { id: '13-animation', title: '进阶 13 · 动画', doc: 'Mixer + flyTo 运镜' },
      { id: '16-shader', title: '进阶 16 · Shader', doc: '热力染色 / 流动管线' },
      { id: '17-gis', title: '进阶 17 · GIS', doc: '经纬度 → 场景坐标' },
      { id: '18-tres', title: '进阶 18-B · TresJS', doc: 'Vue 3 声明式 PBR（与 18-A 对照）' },
      { id: '18-r3f', title: '进阶 18-A · R3F', doc: 'React + drei 声明式 PBR（与 18-B 对照）' },
    ];
    const portfolio = [
      { id: 'p1-product-viewer', title: 'P1 · 产品 3D 展示', doc: 'glTF + 拾取 + 侧栏' },
      { id: 'p2-twin-zone', title: 'P2 · 分区孪生', doc: '分区加载 + CSS2D + 数据' },
      { id: 'p3-dashboard-3d', title: 'P3 · 大屏 3D 块', doc: 'ECharts 联动' },
      { id: 'p4-configurator', title: 'P4 · 3D 配置器', doc: '换色 / 截图' },
    ];
    const card = (base, d) => `
      <a class="card" href="/${base}/${d.id}/index.html">
        <h3>${d.title}</h3>
        <span>${d.doc}</span>
      </a>`;
    document.getElementById('labs').innerHTML = labs.map((d) => card('labs', d)).join('');
    document.getElementById('advanced').innerHTML = advanced.map((d) => card('advanced', d)).join('');
    document.getElementById('portfolio').innerHTML = portfolio.map((d) => card('portfolio', d)).join('');
  </script>
</body>
</html>
