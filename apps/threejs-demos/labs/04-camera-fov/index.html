<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>04 Camera</title>
  <link rel="stylesheet" href="/shared/demo.css" />
</head>
<body class="layout-full">
  <header class="bar"><a href="/">← Demos</a><span>04 · 相机 FOV / fit</span></header>
  <div id="root" style="width:100%;height:calc(100% - 40px);"></div>
  <div class="panel">
    <label>FOV: <span id="fovVal">50</span>°
      <input type="range" id="fov" min="20" max="100" value="50" />
    </label>
    <label>near: <input type="number" id="near" value="0.1" step="0.01" style="width:100%" /></label>
    <button id="fit">fitCameraToObject</button>
    <button id="zfight">演示 z-fighting (near=0.001)</button>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
