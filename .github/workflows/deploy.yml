name: deploy

on:
  push:
    branches:
      - master

# 同一分支多次 push 时只保留最新一次部署，避免乱序
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest

    # 部署到 gh-pages 需要写仓库内容
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，供「最近更新时间」等使用

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VuePress site
        run: export NODE_OPTIONS=--max_old_space_size=10240 && pnpm docs:build

      - name: Set CNAME for custom domain
        run: echo 'blog.zkkysqs.top' > docs/.vuepress/dist/CNAME

      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          target_branch: gh-pages
          build_dir: docs/.vuepress/dist
